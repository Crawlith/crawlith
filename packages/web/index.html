<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crawlith Console</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme') || 'system';
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var shouldUseDark = stored === 'dark' || (stored === 'system' && prefersDark);
          if (shouldUseDark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (_e) {
          // Ignore storage/media query errors
        }
      })();
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
